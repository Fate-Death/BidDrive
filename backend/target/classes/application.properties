# ============================================================
# DATABASE — Choose ONE block below
# ============================================================

# --- Option A: H2 In-Memory (works out of the box, no install) ---
spring.datasource.url=jdbc:h2:mem:auctiondb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
# H2 web console (browse to http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# --- Option B: MySQL (comment out Option A above, uncomment these) ---
#spring.datasource.url=jdbc:mysql://localhost:3306/auction_db?createDatabaseIfNotExist=true
#spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
#spring.datasource.username=root
#spring.datasource.password=YOUR_PASSWORD_HERE
#spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# ============================================================
# JPA
# ============================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# ============================================================
# JWT
# ============================================================
app.jwtSecret=mySecretKeyForCarAuctionApplication1234567890ABCD
app.jwtExpirationMs=86400000
